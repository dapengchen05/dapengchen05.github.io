<!doctype html>
<html lang="zh-CN">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的个人网站</title>

    body {
      font-family: Arial, sans-serif;
      max-width: 760px;

    }
    h1 { margin-bottom: 10px; }
    .card {
      background: #f7f7f7;
      padding: 20px;
      border-radius: 12px;

    }
    a { color: #0a66c2; text-decoration: none; }

</head>
<body>
  <h1>Dapeng Chen | 陈大鹏</h1>
  <p>Welcome! I am a Ph.D. candidate in Economics at Lehigh University. My primary research fields are Health Economics and Labor Economics.</p>

  <div class="card">
    <h2>关于我</h2>
    <p>这里写你的简介，比如你的专业、研究方向、工作经历、兴趣等。</p>
  </div>

  <div class="card">
    <h2>我的项目</h2>
    <p>这里可以放论文、作品集、简历、博客链接。</p>
  </div>

  <div class="card">
    <h2>联系方式</h2>
    <p>Email: yourname@example.com</p>
